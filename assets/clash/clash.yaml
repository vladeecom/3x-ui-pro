mixed-port: 7890
allow-lan: true
tcp-concurrent: true
enable-process: true
find-process-mode: always
mode: rule
log-level: debug
ipv6: false
keep-alive-interval: 30
unified-delay: true

# enable model auto update, the default is false
lgbm-auto-update: true
# model auto update interval, the default is 72 (hours)
lgbm-update-interval: 72
# model update url
lgbm-url: "https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model-middle.bin"

proxy-providers:
  sub:
    type: http
    url: https://${DOMAIN}/${SUB_PATH}/
    path: ./proxy_providers/base64.yml
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
      expected-status: 204



profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: false
  dns-hijack:
    - any:53
  strict-route: true
  mtu: 1500
dns:
  enable: true
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  listen: 127.0.0.1:6868
  ipv6: false
  enhanced-mode: redir-host
  default-nameserver:
    - tls://77.88.8.8#DIRECT # Yandex DNS over TLS
    - 195.208.4.1#DIRECT # НСДИ
    - system
  proxy-server-nameserver:
    - tls://77.88.8.8#DIRECT # Yandex DNS over TLS
    - 195.208.4.1#DIRECT # НСДИ
    - system
  direct-nameserver:
    - tls://77.88.8.8#DIRECT # Yandex DNS over TLS
    - 195.208.4.1#DIRECT # НСДИ
    - system
  nameserver:
    - https://cloudflare-dns.com/dns-query#🌍 VPN
    - https://cloudflare-dns.com/dns-query

proxies:
    
proxy-groups:
  - name: 🌍 VPN
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
    type: select
    include-all: true
    proxies:
      - ⚡️ AUTO
      - 📊 Smart
      # LEAVE THIS LINE!
  - name: ▶️ YouTube
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    include-all: true
    proxies:
      - ⚡️ AUTO
      - 📊 Smart
      # LEAVE THIS LINE!
  - name: ⚡️ AUTO
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png
    type: url-test
    url: https://captive.apple.com/generate_204
    hidden: true
    interval: 300
    include-all: true
    proxies:
      # LEAVE THIS LINE!
  - name: 📊 Smart
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Magic.png
    type: smart
    hidden: true
    # uselightgbm: use LightGBM model predict weight
    uselightgbm: true
    # collectdata: collect datas for model training
    collectdata: false
    # strategy: 'sticky-sessions' or 'round-robin', not support 'consistent-hashing'
    # the default is 'sticky-sessions' with more stable&smoothly nodes switch logic when datas collecting
    strategy: sticky-sessions
    # sample-rate: data acquisition rate, desirable values are 0-1,  the default is 1
    sample-rate: 1
    include-all: true
  - name: 🔓 NO VPN
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Blackhole.png
    type: select
    hidden: true
    proxies:
      - DIRECT

