<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildRight Co. — Under Construction</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f4f5f7;
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: #ffffff;
    border-radius: 4px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.08);
    padding: 3.5rem 3rem;
    max-width: 540px;
    width: 100%;
    text-align: center;
    border-top: 5px solid #f4a100;
  }
  .icon {
    font-size: 4rem;
    margin-bottom: 1.5rem;
    line-height: 1;
  }
  h1 {
    font-size: 2rem;
    color: #1a1a2e;
    font-weight: 700;
    margin-bottom: 0.75rem;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 1rem;
    color: #555;
    line-height: 1.7;
    margin-bottom: 2rem;
  }
  .tape {
    background: #f4a100;
    color: #1a1a2e;
    font-family: 'Courier New', monospace;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.5rem 1.5rem;
    display: inline-block;
    transform: rotate(-1deg);
    margin-bottom: 2rem;
  }
  .progress-bar {
    background: #e9ecef;
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }
  .progress-fill {
    background: linear-gradient(90deg, #f4a100, #ffca28);
    height: 100%;
    width: 68%;
    border-radius: 999px;
  }
  .progress-label {
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    color: #999;
    text-align: right;
  }
  .brand {
    margin-top: 2rem;
    font-size: 0.8rem;
    color: #aaa;
    letter-spacing: 0.1em;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">&#128679;</div>
    <h1>Under Construction</h1>
    <p class="subtitle">
      We're working hard to build something great for you.
      Our team is putting the finishing touches on our new website.
    </p>
    <div class="tape">Work in progress</div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <p class="progress-label">68% complete</p>
    <p class="brand">BuildRight Co. &mdash; Building Better Together</p>
  </div>
</body>
</html>
