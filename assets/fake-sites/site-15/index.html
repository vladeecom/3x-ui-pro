<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Something Great...</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1e3a3f;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    background-image: linear-gradient(160deg, #162b30 0%, #1e4040 50%, #163035 100%);
  }
  .brand {
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: #4ab8c4;
    margin-bottom: 3rem;
  }
  h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: #d6f0f2;
    font-weight: 600;
    margin-bottom: 0.6rem;
    letter-spacing: -0.5px;
  }
  .dots {
    display: inline-flex;
    gap: 0.5rem;
    margin-left: 0.3rem;
    vertical-align: middle;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ab8c4;
    animation: bounce 1.4s ease-in-out infinite both;
  }
  .dot:nth-child(1) { animation-delay: 0s; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }
  .sub {
    font-size: 1rem;
    color: #6a9fa5;
    max-width: 380px;
    line-height: 1.8;
    margin-bottom: 3rem;
    margin-top: 1rem;
  }
  .bar-wrap {
    width: 280px;
    height: 4px;
    background: rgba(74,184,196,0.15);
    border-radius: 999px;
    overflow: hidden;
    margin: 0 auto 3rem;
  }
  .bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #4ab8c4, #80d8e0);
    border-radius: 999px;
    animation: slide 2.8s ease-in-out infinite;
  }
  @keyframes slide {
    0% { width: 0; margin-left: 0; }
    50% { width: 70%; margin-left: 10%; }
    100% { width: 0; margin-left: 100%; }
  }
  .meta {
    font-size: 0.72rem;
    color: #3a6870;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <p class="brand">Slate &amp; Teal Studio</p>
  <h1>Loading Something Great<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></h1>
  <p class="sub">
    We're putting the final pieces together. Something worth waiting for
    is almost ready to launch. Check back very soon.
  </p>
  <div class="bar-wrap"><div class="bar-inner"></div></div>
  <p class="meta">Please stand by &nbsp;&mdash;&nbsp; we're nearly there</p>
</body>
</html>
